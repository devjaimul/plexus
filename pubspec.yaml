name: plexus
description: "Storefront demo app built on fakestoreapi: auth, catalog, favorites and offline cache."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.10.0
  connectivity_plus: ^7.2.0

  # State management & routing
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

  # Models / codegen
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # intl version is pinned by flutter_localizations
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  # gen-l10n: localizations are generated from lib/l10n/*.arb (see l10n.yaml)
  generate: true
